# api-gateway servisine özel konfigürasyon
server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: identity-service-auth
              uri: lb://IDENTITY-SERVICE
              predicates:
                - Path=/api/v1/auth/**
            - id: identity-service-users
              uri: lb://IDENTITY-SERVICE
              predicates:
                - Path=/api/v1/users/**
            - id: customer-service
              uri: lb://CUSTOMER-SERVICE
              predicates:
                - Path=/api/v1/customers/**
            - id: product-catalog-service
              uri: lb://PRODUCT-CATALOG-SERVICE
              predicates:
                - Path=/api/v1/products/**
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/v1/orders/**
            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/api/v1/payments/**
            - id: subscription-service
              uri: lb://SUBSCRIPTION-SERVICE
              predicates:
                - Path=/api/v1/subscriptions/**
            - id: usage-service
              uri: lb://USAGE-SERVICE
              predicates:
                - Path=/api/v1/usage/**
            - id: billing-service
              uri: lb://BILLING-SERVICE
              predicates:
                - Path=/api/v1/billing/**
            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/api/v1/notifications/**
            - id: ticket-service
              uri: lb://TICKET-SERVICE
              predicates:
                - Path=/api/v1/tickets/**
  data:
    redis:
      host: localhost
      port: 6379

telcox:
  gateway:
    rate-limit:
      requests-per-minute: 100
    public-paths:
      - pattern: /api/v1/auth/**
      - pattern: /actuator/**
      - pattern: /eureka/**
      - pattern: /*/v3/api-docs/**
      - pattern: /*/swagger-ui/**
      - pattern: /*/swagger-ui.html
      - pattern: /api/v1/customers
        method: POST
      - pattern: /api/v1/products/**
        method: GET
      - pattern: /api/v1/tickets
        method: POST
