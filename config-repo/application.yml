# Tüm servislerin ortak baz konfigürasyonu (config-server tarafından servis edilir)

# MVP basitleştirmesi: paylaşılan HS256 secret'ı config-repo'da tutuyoruz.
# Faz 8'de K8s Secret/Vault'a taşınacak (SR-05 emsal pattern).
telcox:
  jwt:
    secret: GKcxLMdui5n/4mjjQY0fXR8RuuXkY7LgCLg8PGXxZeo=
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
  security:
    pii-encryption-key: eZumgKAnokiq2AjJE3MyqDd5ZFaDlEGoDGR+M3P/Ksw=
  outbox:
    poll-interval-ms: 2000

spring:
  kafka:
    bootstrap-servers: localhost:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{correlationId:-}]"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: false
    hostname: localhost
