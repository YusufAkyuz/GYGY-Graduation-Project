apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: telco-crm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: telcox/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom: {configMapKeyRef: {name: telcox-common-config, key: SPRING_PROFILES_ACTIVE}}
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom: {configMapKeyRef: {name: telcox-common-config, key: EUREKA_SERVICE_URL}}
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom: {configMapKeyRef: {name: telcox-common-config, key: KAFKA_BOOTSTRAP_SERVERS}}
            - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
              valueFrom: {configMapKeyRef: {name: telcox-common-config, key: ZIPKIN_ENDPOINT}}
            - name: TELCOX_JWT_SECRET
              valueFrom: {secretKeyRef: {name: telcox-secrets, key: JWT_SECRET}}
            - name: TELCOX_SECURITY_PIIENCRYPTIONKEY
              valueFrom: {secretKeyRef: {name: telcox-secrets, key: PII_ENCRYPTION_KEY}}
            - name: SPRING_DATA_REDIS_HOST
              valueFrom: {configMapKeyRef: {name: telcox-common-config, key: REDIS_HOST}}
          readinessProbe:
            httpGet: {path: /actuator/health, port: 8080}
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /actuator/health, port: 8080}
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            requests: {cpu: 200m, memory: 384Mi}
            limits: {cpu: "1", memory: 768Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: telco-crm
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer
