apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: telco-crm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
    spec:
      containers:
        - name: discovery-server
          image: telcox/discovery-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          readinessProbe:
            httpGet: {path: /actuator/health, port: 8761}
            initialDelaySeconds: 15
          livenessProbe:
            httpGet: {path: /actuator/health, port: 8761}
            initialDelaySeconds: 30
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 500m, memory: 512Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: telco-crm
spec:
  selector:
    app: discovery-server
  ports:
    - port: 8761
      targetPort: 8761
