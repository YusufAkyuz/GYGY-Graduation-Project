apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: telco-crm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: telcox/payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9008
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom: {configMapKeyRef: {name: telcox-common-config, key: SPRING_PROFILES_ACTIVE}}
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom: {configMapKeyRef: {name: telcox-common-config, key: EUREKA_SERVICE_URL}}
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom: {configMapKeyRef: {name: telcox-common-config, key: KAFKA_BOOTSTRAP_SERVERS}}
            - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
              valueFrom: {configMapKeyRef: {name: telcox-common-config, key: ZIPKIN_ENDPOINT}}
            - name: TELCOX_JWT_SECRET
              valueFrom: {secretKeyRef: {name: telcox-secrets, key: JWT_SECRET}}
            - name: TELCOX_SECURITY_PIIENCRYPTIONKEY
              valueFrom: {secretKeyRef: {name: telcox-secrets, key: PII_ENCRYPTION_KEY}}

            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/payment_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "telcox"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: {secretKeyRef: {name: telcox-secrets, key: POSTGRES_PASSWORD}}
          readinessProbe:
            httpGet: {path: /actuator/health, port: 9008}
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /actuator/health, port: 9008}
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            requests: {cpu: 200m, memory: 384Mi}
            limits: {cpu: "1", memory: 768Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: telco-crm
spec:
  selector:
    app: payment-service
  ports:
    - port: 9008
      targetPort: 9008
  
